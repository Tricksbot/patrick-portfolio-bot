services:
  - type: worker
    name: patrick-portfolio-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
